<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Meriton Pantry Vacuums</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    :root {
      --green-bg: #E1F5EE; --green-text: #085041; --green-border: #1D9E75;
      --red-bg: #FCEBEB; --red-text: #501313; --red-border: #E24B4A;
      --radius-md: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding: 16px; }

    .hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .hdr-title { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .hdr-sub { font-size: 12px; color: #888; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat { background: #fff; border-radius: var(--radius-md); padding: 12px 14px; border: 0.5px solid #e5e5e5; }
    .stat-n { font-size: 22px; font-weight: 600; }
    .stat-l { font-size: 11px; color: #888; margin-top: 2px; }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 0.5px solid #d0d0d0; border-radius: var(--radius-lg);
      font-size: 15px; background: #fff; color: #1a1a1a; outline: none;
    }
    .search-wrap input:focus { border-color: #888; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #aaa; pointer-events: none; }

    .floor-list { display: flex; flex-direction: column; gap: 8px; }
    .fc { background: #fff; border: 0.5px solid #e5e5e5; border-radius: var(--radius-lg); overflow: hidden; }
    .fc-header { display: flex; align-items: center; cursor: pointer; padding: 13px 14px; gap: 10px; user-select: none; }
    .fc-indicator { width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0; }
    .ind-has { background: #1D9E75; } .ind-none { background: #E24B4A; } .ind-unk { background: #d0d0d0; }
    .fc-info { flex: 1; }
    .fc-lvl { font-size: 15px; font-weight: 500; }
    .fc-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .b-has { background: var(--green-bg); color: var(--green-text); }
    .b-none { background: var(--red-bg); color: var(--red-text); }
    .b-unk { background: #f0f0f0; color: #666; }
    .fc-qty { font-size: 12px; color: #999; }
    .chevron { font-size: 13px; color: #bbb; transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(180deg); }

    .fc-body { padding: 0 14px 14px; border-top: 0.5px solid #f0f0f0; }
    .tog-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .tog { padding: 11px; border-radius: var(--radius-md); border: 0.5px solid #d0d0d0; background: transparent; cursor: pointer; font-size: 13px; color: #666; text-align: center; }
    .tog:active { opacity: .7; }
    .tog.sel-has { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); font-weight: 500; }
    .tog.sel-none { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); font-weight: 500; }

    .qty-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .qty-btn { width: 38px; height: 38px; border-radius: var(--radius-md); border: 0.5px solid #d0d0d0; background: transparent; cursor: pointer; font-size: 22px; color: #1a1a1a; display: flex; align-items: center; justify-content: center; }
    .qty-btn:active { background: #f5f5f5; }
    .qty-val { font-size: 20px; font-weight: 600; min-width: 26px; text-align: center; }
    .qty-lbl { font-size: 12px; color: #999; }

    .note-box { width: 100%; margin-top: 10px; padding: 9px 12px; border: 0.5px solid #d0d0d0; border-radius: var(--radius-md); font-size: 13px; background: #fafafa; color: #1a1a1a; resize: none; height: 52px; font-family: inherit; outline: none; }
    .note-box:focus { border-color: #888; background: #fff; }
    .empty { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 9px 18px; border-radius: 99px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #f0f0f0; }
      .stat, .fc, .search-wrap input, .note-box { background: #1e1e1e; border-color: #333; color: #f0f0f0; }
      .fc-body { border-color: #2a2a2a; }
      .b-unk { background: #2a2a2a; color: #999; }
      .tog { border-color: #333; color: #aaa; }
      .qty-btn { border-color: #333; color: #f0f0f0; }
      .note-box { background: #161616; }
      .ind-unk { background: #444; }
      .hdr-title, .fc-lvl { color: #f0f0f0; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <div class="hdr-title">🏢 Pantry vacuums</div>
      <div class="hdr-sub"><span class="dot"></span><span id="sync-lbl">Connecting…</span></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-has" style="color:#0F6E56">—</div><div class="stat-l">Floors with vacuum</div></div>
    <div class="stat"><div class="stat-n" id="s-none" style="color:#A32D2D">—</div><div class="stat-l">Floors missing</div></div>
    <div class="stat"><div class="stat-n" id="s-total" style="color:#1a1a1a">—</div><div class="stat-l">Total vacuums</div></div>
    <div class="stat"><div class="stat-n" id="s-unk" style="color:#999">—</div><div class="stat-l">Not checked</div></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="number" id="search" placeholder="Type floor number e.g. 12"
           min="4" max="29" inputmode="numeric" oninput="onSearch(this.value)" />
  </div>

  <div class="floor-list" id="floor-list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = "https://bizgyzqrgwjkntszihci.supabase.co";
  const SUPABASE_KEY = "sb_publishable_b4I1E_66kkwI8ach3ZPgLw_bM675B9l";
  const FLOORS = Array.from({length: 26}, (_, i) => i + 4);

  let data = {};
  let openFloor = null;
  let searchVal = '';
  let noteTimers = {};

  function defaultFloor() { return { status: 'unknown', qty: 0, note: '' }; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  async function sbFetch(path, options = {}) {
    const res = await fetch(SUPABASE_URL + path, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
        ...options.headers
      },
      ...options
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  async function loadAll() {
    const rows = await sbFetch('/rest/v1/floors?select=*&order=floor.asc');
    FLOORS.forEach(f => { data[f] = defaultFloor(); });
    rows.forEach(r => { data[r.floor] = { status: r.status, qty: r.qty, note: r.note || '' }; });
  }

  async function upsertFloor(f) {
    const d = data[f];
    await sbFetch('/rest/v1/floors', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ floor: f, status: d.status, qty: d.qty, note: d.note })
    });
  }

  async function setStatus(f, s) {
    data[f].status = s;
    if (s === 'none') data[f].qty = 0;
    if (s === 'has' && data[f].qty === 0) data[f].qty = 1;
    render();
    await upsertFloor(f);
    showToast('Level ' + f + ' saved ✓');
  }

  async function changeQty(f, delta) {
    data[f].qty = Math.max(0, (data[f].qty || 0) + delta);
    data[f].status = data[f].qty > 0 ? 'has' : 'none';
    render();
    await upsertFloor(f);
  }

  function scheduleNote(f, val) {
    data[f].note = val;
    clearTimeout(noteTimers[f]);
    noteTimers[f] = setTimeout(async () => {
      await upsertFloor(f);
      showToast('Note saved ✓');
    }, 900);
  }

  function onSearch(v) { searchVal = v.trim(); render(); }
  function toggleFloor(f) { openFloor = openFloor === f ? null : f; render(); }
  function floorsToShow() {
    if (searchVal === '') return FLOORS;
    return FLOORS.filter(f => String(f).startsWith(searchVal));
  }

  function render() {
    const list = document.getElementById('floor-list');
    const floors = floorsToShow();
    if (floors.length === 0) {
      list.innerHTML = `<div class="empty">No floors match "${searchVal}"</div>`;
      updateStats(); return;
    }

    const focusId = document.activeElement ? document.activeElement.id : null;
    list.innerHTML = '';

    floors.forEach(f => {
      const d = data[f] || defaultFloor();
      const isOpen = openFloor === f;
      const badgeMap = {
        has:     `<span class="badge b-has">Has vacuum</span>`,
        none:    `<span class="badge b-none">Missing</span>`,
        unknown: `<span class="badge b-unk">Not checked</span>`
      };
      const indMap = { has: 'ind-has', none: 'ind-none', unknown: 'ind-unk' };

      const card = document.createElement('div');
      card.className = 'fc';

      const qtyLine = d.status === 'has'
        ? `<div class="qty-row">
            <button class="qty-btn" onclick="changeQty(${f},-1)">−</button>
            <span class="qty-val">${d.qty}</span>
            <button class="qty-btn" onclick="changeQty(${f},1)">+</button>
            <span class="qty-lbl">vacuum${d.qty !== 1 ? 's' : ''} in pantry</span>
           </div>` : '';

      const body = isOpen
        ? `<div class="fc-body">
            <div class="tog-row">
              <button class="tog ${d.status === 'has' ? 'sel-has' : ''}" onclick="setStatus(${f},'has')">✓ Yes, has one</button>
              <button class="tog ${d.status === 'none' ? 'sel-none' : ''}" onclick="setStatus(${f},'none')">✗ No vacuum</button>
            </div>
            ${qtyLine}
            <textarea id="note-${f}" class="note-box" placeholder="Add a note…"
              oninput="scheduleNote(${f},this.value)">${d.note || ''}</textarea>
           </div>` : '';

      card.innerHTML = `
        <div class="fc-header" onclick="toggleFloor(${f})">
          <div class="fc-indicator ${indMap[d.status]}"></div>
          <div class="fc-info">
            <div class="fc-lvl">Level ${f}</div>
            <div class="fc-meta">
              ${badgeMap[d.status]}
              ${d.status === 'has' ? `<span class="fc-qty">${d.qty} pc${d.qty !== 1 ? 's' : ''}</span>` : ''}
            </div>
          </div>
          <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
        </div>
        ${body}`;
      list.appendChild(card);
    });

    if (focusId && focusId.startsWith('note-')) {
      const el = document.getElementById(focusId);
      if (el) { el.focus(); const l = el.value.length; el.setSelectionRange(l, l); }
    }
    updateStats();
  }

  function updateStats() {
    let has = 0, none = 0, unk = 0, total = 0;
    FLOORS.forEach(f => {
      const d = data[f] || defaultFloor();
      if (d.status === 'has') { has++; total += d.qty || 0; }
      else if (d.status === 'none') none++;
      else unk++;
    });
    document.getElementById('s-has').textContent = has;
    document.getElementById('s-none').textContent = none;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-unk').textContent = unk;
  }

  async function poll() {
    try {
      await loadAll();
      render();
      const t = new Date();
      document.getElementById('sync-lbl').textContent =
        'Live · ' + t.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
    } catch(e) {
      document.getElementById('sync-lbl').textContent = 'Connection error';
    }
  }

  async function init() {
    try {
      await loadAll();
      render();
      document.getElementById('sync-lbl').textContent = 'Live';
      setInterval(poll, 3000);
    } catch(e) {
      document.getElementById('sync-lbl').textContent = 'Error: ' + e.message;
    }
  }

  init();
</script>
</body>
</html>
